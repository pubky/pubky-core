openapi: 3.1.0
info:
  title: Pubky Homeserver API
  description: |
    The Pubky Homeserver exposes three servers:
    - **Client Server** — Primary API for user authentication, file storage, and event streaming.
    - **Admin Server** — Password-protected administration endpoints.
    - **Metrics Server** — Prometheus metrics (`GET /metrics`).

    This specification covers the Client Server and Admin Server.

    ## Tenant Identification

    Per-tenant (user) routes resolve the target user from these sources (highest priority first):
    1. `pubky-host` header (explicit override; takes precedence over `Host`)
    2. `Host` header (e.g. from TLS SNI on the Pubky socket)
    3. `?pubky-host=` query parameter (fallback when no key found in headers)

    The value must be a z-base-32 encoded Ed25519 public key.

    ## Authentication

    Two authentication methods exist:
    - **Grant-based (current):** `Authorization: Bearer <token>` obtained via `POST /auth/grant/session`.
    - **Cookie-based (deprecated):** Session cookie set by `POST /signup` or `POST /session`.

    Grant middleware runs first; if it produces a session, cookie middleware is skipped.

    ## Capabilities

    Write operations are gated by capability-based access control. Capabilities are
    path-scoped (e.g. `read_write:/pub/app/`) or `root` (full access to `/pub/`).

    ## Write Path Restriction

    All PUT/DELETE operations require paths under `/pub/`. Attempts to write elsewhere
    return `403 Forbidden`.
  version: 0.9.0
  license:
    name: MIT

servers:
  - url: http://localhost:6287
    description: Client server (Pubky socket, default port)

tags:
  - name: General
    description: Health check and public info
  - name: Auth - Grant
    description: Grant-based authentication (current)
  - name: Auth - Cookie
    description: Cookie-based authentication (deprecated)
  - name: Data
    description: Per-tenant file read/write and directory listing
  - name: Events
    description: Event streaming and historical feeds
  - name: Signup Tokens
    description: Signup token management
  - name: Admin
    description: |
      Admin server endpoints (password-protected). These run on a **separate server**
      (`localhost:6288` by default).

paths:
  # ──────────────────────────────────────────────────────────────────────
  # Client Server — General
  # ──────────────────────────────────────────────────────────────────────
  /:
    get:
      tags: [General]
      summary: Server info
      description: Basic health check / server identification.
      operationId: getRoot
      responses:
        "200":
          description: Server name
          content:
            text/plain:
              schema:
                type: string
                example: Pubky Homeserver

  # ──────────────────────────────────────────────────────────────────────
  # Signup Tokens
  # ──────────────────────────────────────────────────────────────────────
  /signup_tokens/{token}:
    get:
      tags: [Signup Tokens]
      summary: Check signup token status
      operationId: getSignupToken
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token status
          headers:
            Cache-Control:
              schema:
                type: string
                example: no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupTokenResponse"
        "400":
          description: Invalid token format or signup tokens not required
        "404":
          description: Token not found

  # ──────────────────────────────────────────────────────────────────────
  # Auth — Grant-based (current)
  # ──────────────────────────────────────────────────────────────────────
  /auth/grant/signup:
    post:
      tags: [Auth - Grant]
      summary: Create account with grant
      operationId: grantSignup
      parameters:
        - name: signup_token
          in: query
          required: false
          description: Required if the server's signup mode is `TokenRequired`.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGrantSessionRequest"
      responses:
        "204":
          description: Account created successfully
        "400":
          description: Invalid token format, invalid grant format, or signup token required
        "401":
          description: Invalid grant signature, expired grant, invalid/used signup token, or PoP verification failed
        "409":
          description: User already exists

  /auth/grant/session:
    post:
      tags: [Auth - Grant]
      summary: Exchange grant + PoP for bearer token
      operationId: createGrantSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGrantSessionRequest"
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrantSessionResponse"
        "400":
          description: Invalid grant format or invalid signup grant
        "401":
          description: Invalid grant signature, expired grant, PoP verification failed, nonce replay, or grant revoked/expired
        "404":
          description: User not found

    get:
      tags: [Auth - Grant]
      summary: Get current grant session info
      operationId: getGrantSession
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Session info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrantSessionInfo"
        "401":
          description: No valid grant session

    delete:
      tags: [Auth - Grant]
      summary: Revoke current grant session
      description: Idempotent — returns 200 even without a valid session.
      operationId: deleteGrantSession
      security:
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: Session revoked (idempotent)

  /auth/grant/sessions:
    get:
      tags: [Auth - Grant]
      summary: List all active grants
      description: Requires root capability.
      operationId: listGrants
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of active grants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GrantInfo"
        "401":
          description: No valid session
        "403":
          description: Session lacks root capability

  /auth/grant/session/{gid}:
    delete:
      tags: [Auth - Grant]
      summary: Revoke a specific grant
      description: Requires root capability. Revokes the grant and all its sessions.
      operationId: revokeGrant
      security:
        - bearerAuth: []
      parameters:
        - name: gid
          in: path
          required: true
          description: Grant ID to revoke
          schema:
            type: string
      responses:
        "200":
          description: Grant revoked
        "400":
          description: Invalid grant ID format
        "401":
          description: No valid session
        "403":
          description: Session lacks root capability or grant does not belong to authenticated user
        "404":
          description: Grant not found

  # ──────────────────────────────────────────────────────────────────────
  # Auth — Cookie-based (deprecated)
  # ──────────────────────────────────────────────────────────────────────
  /signup:
    post:
      tags: [Auth - Cookie]
      summary: Create user and login (deprecated)
      operationId: cookieSignup
      deprecated: true
      parameters:
        - name: signup_token
          in: query
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: Postcard-serialized AuthToken
      responses:
        "200":
          description: Signup successful
          headers:
            Set-Cookie:
              description: Session cookie
              schema:
                type: string
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
                description: Postcard-serialized session record
        "400":
          description: Invalid AuthToken, token format, or signup token required
        "401":
          description: Invalid or already-used signup token
        "409":
          description: User already exists

  /session:
    post:
      tags: [Auth - Cookie]
      summary: Sign in (deprecated)
      operationId: cookieSignin
      deprecated: true
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: Postcard-serialized AuthToken
      responses:
        "200":
          description: Signin successful
          headers:
            Set-Cookie:
              description: Session cookie
              schema:
                type: string
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid AuthToken
        "404":
          description: User not found

    get:
      tags: [Auth - Cookie]
      summary: Get current session info (deprecated)
      operationId: getCookieSession
      deprecated: true
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Session info
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
                description: Postcard-serialized legacy session info
        "401":
          description: No valid cookie session

    delete:
      tags: [Auth - Cookie]
      summary: Logout (deprecated)
      description: Idempotent — returns 200 even without a valid session.
      operationId: cookieSignout
      deprecated: true
      security:
        - cookieAuth: []
        - {}
      responses:
        "200":
          description: Logged out (idempotent)
          headers:
            Set-Cookie:
              description: Cookie removal header
              schema:
                type: string

  # ──────────────────────────────────────────────────────────────────────
  # Per-Tenant Data Routes
  # ──────────────────────────────────────────────────────────────────────
  /{path}:
    # Note: This is a catch-all route. The server matches multi-segment paths
    # (e.g. pub/documents/notes.txt) even though OpenAPI path parameters
    # technically represent a single segment.
    parameters:
      - name: path
        in: path
        required: true
        description: |
          WebDAV path relative to the tenant. Must start with `pub/` for all operations
          (reads and writes). May contain slashes (multi-segment).
        schema:
          type: string
        examples:
          file:
            value: pub/documents/notes.txt
          directory:
            value: pub/documents/
      - $ref: "#/components/parameters/PubkyHost"
      - $ref: "#/components/parameters/PubkyHostQuery"

    get:
      tags: [Data]
      summary: Get file or list directory
      description: |
        If the path points to a file, returns the file content with caching headers.
        If the path points to a directory (trailing `/`), returns a newline-separated
        list of `pubky://` URLs.

        Supports conditional requests via `If-None-Match` and `If-Modified-Since`.
      operationId: getEntry
      parameters:
        - name: limit
          in: query
          description: Items per page (directory listing only)
          schema:
            type: integer
            minimum: 1
            maximum: 65535
        - name: cursor
          in: query
          description: Pagination cursor (directory listing only). May be a bare path or `pubky://` prefixed.
          schema:
            type: string
        - name: shallow
          in: query
          description: List only immediate children instead of deep recursive listing.
          schema:
            type: boolean
            default: false
        - name: reverse
          in: query
          description: Reverse listing order.
          schema:
            type: boolean
            default: false
        - name: If-None-Match
          in: header
          description: Return 304 if any listed ETag matches.
          schema:
            type: string
        - name: If-Modified-Since
          in: header
          description: Return 304 if file has not been modified since this date.
          schema:
            type: string
      responses:
        "200":
          description: File content or directory listing
          headers:
            Content-Type:
              description: Detected from magic bytes or file extension (files), or `text/plain` (directories).
              schema:
                type: string
            Content-Length:
              description: File size in bytes (files only).
              schema:
                type: integer
            ETag:
              description: Quoted base64-encoded BLAKE3 hash (files only).
              schema:
                type: string
                example: '"r0NJufX5oaagQE3qNtzJSZvLJcmtwRK3zJqTyuQfMmI="'
            Last-Modified:
              description: HTTP date of last modification (files only).
              schema:
                type: string
            Cache-Control:
              schema:
                type: string
                example: private, must-revalidate
            Vary:
              schema:
                type: string
                example: pubky-host
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
                description: File content (for file paths)
            text/plain:
              schema:
                type: string
                description: |
                  Newline-separated list of `pubky://` URLs (for directory paths).
                example: |
                  pubky://o1gg96ewuojmopcjbz8895478wdtxtzzuxnfjjz8o8e77csa1ngo/pub/notes.txt
                  pubky://o1gg96ewuojmopcjbz8895478wdtxtzzuxnfjjz8o8e77csa1ngo/pub/photo.png
        "304":
          description: Not modified
          headers:
            ETag:
              schema:
                type: string
            Last-Modified:
              schema:
                type: string
            Cache-Control:
              schema:
                type: string
            Vary:
              schema:
                type: string
        "400":
          description: Invalid cursor
        "404":
          description: File or directory not found, or tenant (user) does not exist

    head:
      tags: [Data]
      summary: Get file metadata
      description: Returns the same headers as GET but without the response body.
      operationId: headEntry
      responses:
        "200":
          description: File metadata in headers
          headers:
            Content-Type:
              schema:
                type: string
            Content-Length:
              schema:
                type: integer
            ETag:
              schema:
                type: string
            Last-Modified:
              schema:
                type: string
            Cache-Control:
              schema:
                type: string
            Vary:
              schema:
                type: string
        "404":
          description: File not found, or tenant (user) does not exist

    put:
      tags: [Data]
      summary: Create or update file
      description: |
        Writes a file at the given path. Path must be under `/pub/`.
        The authenticated user must match the target tenant and have write capability
        covering the path.

        If `Content-Length` is provided, a quota pre-check is performed before streaming.
      operationId: putEntry
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "201":
          description: File created or updated
        "401":
          description: No valid session
        "403":
          description: |
            Session user does not match target tenant, path outside `/pub/`,
            session lacks write capability for path, or user account is disabled.
        "507":
          description: Storage quota exceeded

    delete:
      tags: [Data]
      summary: Delete file
      description: |
        Deletes a file at the given path. Path must be under `/pub/`.
        The authenticated user must match the target tenant and have write capability.
      operationId: deleteEntry
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "204":
          description: File deleted
        "401":
          description: No valid session
        "403":
          description: Insufficient permissions or path outside `/pub/`
        "404":
          description: File not found

  # ──────────────────────────────────────────────────────────────────────
  # Events
  # ──────────────────────────────────────────────────────────────────────
  /events/:
    get:
      tags: [Events]
      summary: Historical event feed (plain text)
      description: |
        Legacy endpoint returning a plain-text feed of file change events.
      operationId: getEventFeed
      parameters:
        - name: cursor
          in: query
          description: Starting cursor position. Defaults to `"0"` (beginning) when omitted.
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of events to return.
          schema:
            type: integer
            minimum: 1
            maximum: 65535
      responses:
        "200":
          description: Event feed
          content:
            text/plain:
              schema:
                type: string
              example: |
                PUT pubky://o1gg96ewuo.../pub/example.txt
                DEL pubky://o1gg96ewuo.../pub/old.txt
                cursor: 12345
        "400":
          description: Invalid cursor

  /events-stream:
    get:
      tags: [Events]
      summary: Real-time event stream (SSE)
      description: |
        Server-Sent Events endpoint with two modes:
        - **Batch mode** (`live=false` or omitted): fetches historical events then closes.
        - **Live mode** (`live=true`): fetches historical events, then streams new events in real-time.

        Slow clients that fall behind in live mode will have their connection closed.

        Each SSE message has an event type (`PUT` or `DEL`) and multiline data:
        ```
        event: PUT
        data: pubky://user_pubkey/pub/example.txt
        data: cursor: 42
        data: content_hash: r0NJufX5oaagQE3qNtzJSZvLJcmtwRK3zJqTyuQfMmI=
        ```

        This path is served by **two servers with different contracts** (select the server below):
        - **Client server** (`http://localhost:6287`): session-authenticated. `user` is **required**;
          `/priv/...` paths require an authorized session capability (otherwise `401`/`403`).
        - **Admin server** (`http://localhost:6288`): authenticated with the `X-Admin-Password`
          header. Streams **all** events including private (`/priv/...`) paths and responds with
          `Cache-Control: no-store`. `user` is **optional** (omit to stream every user); a single
          global `cursor` paginates the combined feed.
      operationId: getEventStream
      servers:
        - url: http://localhost:6287
          description: Client server (session auth)
        - url: http://localhost:6288
          description: Admin server (X-Admin-Password)
      security:
        - {}
        - bearerAuth: []
        - cookieAuth: []
        - adminPassword: []
      parameters:
        - name: user
          in: query
          required: false
          description: |
            One or more user public keys (z-base-32). Repeat for multiple users.
            Optionally append `:cursor` to start from a specific position.
            **Required** on the client server; **optional** on the admin server (omit to stream all users).
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          examples:
            single:
              value: [o1gg96ewuojmopcjbz8895478wdtxtzzuxnfjjz8o8e77csa1ngo]
            withCursor:
              value: ["o1gg96ewuojmopcjbz8895478wdtxtzzuxnfjjz8o8e77csa1ngo:42"]
        - name: cursor
          in: query
          description: |
            Resume from a single global cursor (admin server). On the client server, append
            `:cursor` to each `user` value instead.
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum total events to send.
          schema:
            type: integer
            minimum: 1
            maximum: 65535
        - name: reverse
          in: query
          description: Reverse chronological order. Cannot be combined with `live=true`.
          schema:
            type: boolean
            default: false
        - name: live
          in: query
          description: Enable live streaming mode. Cannot be combined with `reverse=true`.
          schema:
            type: boolean
            default: false
        - name: path
          in: query
          description: |
            Path filter (repeatable; union — an event matches if it satisfies any). A trailing slash
            matches a directory and its descendants; otherwise it matches that exact file. On the
            client server, `/priv/...` paths require an authorized session capability; the admin
            server returns all paths.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          examples:
            publicDir:
              value: ["/pub/files/"]
            mixed:
              value: ["/pub/", "/priv/app/"]
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: |
            Invalid user pubkey, missing user parameter, too many users,
            live + reverse combination, or invalid path.
        "401":
          description: |
            Client server: a private path was requested without a session.
            Admin server: missing or invalid `X-Admin-Password`.
        "403":
          description: "Client server: missing path read capability"
        "404":
          description: User not found

  # ──────────────────────────────────────────────────────────────────────
  # Admin Server
  # ──────────────────────────────────────────────────────────────────────
  /info:
    get:
      tags: [Admin]
      summary: Server statistics
      operationId: getAdminInfo
      servers:
        - url: http://localhost:6288
      security:
        - adminPassword: []
      responses:
        "200":
          description: Server statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminInfoResponse"
        "401":
          description: Missing or invalid admin password

  /generate_signup_token:
    get:
      tags: [Admin]
      summary: Generate signup token (default limits)
      operationId: generateSignupToken
      servers:
        - url: http://localhost:6288
      security:
        - adminPassword: []
      responses:
        "200":
          description: Generated token
          content:
            text/plain:
              schema:
                type: string
        "401":
          description: Missing or invalid admin password

    post:
      tags: [Admin]
      summary: Generate signup token (custom limits)
      operationId: generateSignupTokenWithLimits
      servers:
        - url: http://localhost:6288
      security:
        - adminPassword: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserQuota"
            examples:
              customLimits:
                value:
                  storage_quota_mb: 1024
                  rate_read: "200mb/m"
              unlimited:
                value:
                  storage_quota_mb: "unlimited"
                  rate_read: "unlimited"
                  rate_write: "unlimited"
      responses:
        "200":
          description: Generated token
          content:
            text/plain:
              schema:
                type: string
        "401":
          description: Missing or invalid admin password
        "422":
          description: Invalid quota format

  /signup_tokens:
    get:
      tags: [Admin]
      summary: List signup tokens
      description: |
        Paginated list of signup tokens with usage information.
        Supports filtering by state (`all`, `used`, `unused`).
      operationId: listSignupTokens
      servers:
        - url: http://localhost:6288
      security:
        - adminPassword: []
      parameters:
        - name: limit
          in: query
          description: Maximum number of tokens to return per page.
          schema:
            type: integer
            minimum: 1
            maximum: 65535
        - name: cursor
          in: query
          description: Pagination cursor (token string from `next_cursor` of a previous response).
          schema:
            type: string
        - name: state
          in: query
          description: Filter by token state.
          schema:
            type: string
            enum: [all, used, unused]
            default: all
      responses:
        "200":
          description: Paginated list of signup tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupTokensResponse"
        "400":
          description: Invalid query parameters (bad cursor format, unknown state, limit=0)
        "401":
          description: Missing or invalid admin password

  /webdav/{entry_path}:
    delete:
      tags: [Admin]
      summary: Delete entry via admin
      operationId: adminDeleteEntry
      servers:
        - url: http://localhost:6288
      security:
        - adminPassword: []
      parameters:
        - name: entry_path
          in: path
          required: true
          description: "Full path: `{pubkey}/path` (e.g. `o1gg96ewuo.../pub/file.txt`)"
          schema:
            type: string
      responses:
        "204":
          description: Entry deleted
        "400":
          description: Invalid pubkey format
        "401":
          description: Missing or invalid admin password
        "404":
          description: Entry not found

  /dav/{path}:
    description: |
      Full WebDAV endpoint. In addition to GET/PUT/DELETE shown here, this route
      accepts any HTTP method (via `any()` handler) including PROPFIND, MKCOL, etc.
    get:
      tags: [Admin]
      summary: WebDAV GET
      operationId: adminDavGet
      servers:
        - url: http://localhost:6288
      security:
        - adminBasicAuth: []
      parameters:
        - name: path
          in: path
          required: true
          description: "WebDAV path: `{pubkey}/{webdav_path}`"
          schema:
            type: string
      responses:
        "200":
          description: File content
        "404":
          description: Not found
    put:
      tags: [Admin]
      summary: WebDAV PUT
      operationId: adminDavPut
      servers:
        - url: http://localhost:6288
      security:
        - adminBasicAuth: []
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "201":
          description: File created
    delete:
      tags: [Admin]
      summary: WebDAV DELETE
      operationId: adminDavDelete
      servers:
        - url: http://localhost:6288
      security:
        - adminBasicAuth: []
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: File deleted

  /users/{pubkey}/disable:
    post:
      tags: [Admin]
      summary: Disable user account
      operationId: disableUser
      servers:
        - url: http://localhost:6288
      security:
        - adminPassword: []
      parameters:
        - $ref: "#/components/parameters/AdminPubkey"
      responses:
        "200":
          description: User disabled
          content:
            text/plain:
              schema:
                type: string
                example: Ok
        "400":
          description: Invalid pubkey format
        "401":
          description: Missing or invalid admin password
        "404":
          description: User not found

  /users/{pubkey}/enable:
    post:
      tags: [Admin]
      summary: Enable user account
      operationId: enableUser
      servers:
        - url: http://localhost:6288
      security:
        - adminPassword: []
      parameters:
        - $ref: "#/components/parameters/AdminPubkey"
      responses:
        "200":
          description: User enabled
          content:
            text/plain:
              schema:
                type: string
                example: Ok
        "400":
          description: Invalid pubkey format
        "401":
          description: Missing or invalid admin password
        "404":
          description: User not found

  /users/{pubkey}/quota:
    get:
      tags: [Admin]
      summary: Get user quota
      description: |
        Returns both the effective quota (overrides merged with system defaults)
        and the raw per-user overrides.
      operationId: getUserQuota
      servers:
        - url: http://localhost:6288
      security:
        - adminPassword: []
      parameters:
        - $ref: "#/components/parameters/AdminPubkey"
      responses:
        "200":
          description: User quota
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserQuotaResponse"
              examples:
                withDefaults:
                  value:
                    effective:
                      storage_quota_mb: 100
                      rate_read: "10mb/s"
                      rate_write: "5mb/s"
                    overrides: {}
                withOverrides:
                  value:
                    effective:
                      storage_quota_mb: 500
                      rate_read: "100mb/m"
                      rate_write: "unlimited"
                    overrides:
                      storage_quota_mb: 500
                      rate_read: "100mb/m"
        "400":
          description: Invalid pubkey format
        "401":
          description: Missing or invalid admin password
        "404":
          description: User not found

    patch:
      tags: [Admin]
      summary: Update user quota
      description: |
        Partially update per-user quota overrides.
        - Absent fields: keep existing value
        - `null`: reset to system default
        - `"unlimited"`: no limit
        - Value: explicit custom limit
      operationId: patchUserQuota
      servers:
        - url: http://localhost:6288
      security:
        - adminPassword: []
      parameters:
        - $ref: "#/components/parameters/AdminPubkey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserQuotaPatch"
            examples:
              setCustom:
                value:
                  storage_quota_mb: 500
                  rate_read: "100mb/m"
              resetToDefault:
                value:
                  storage_quota_mb: null
                  rate_read: null
                  rate_write: null
              setUnlimited:
                value:
                  rate_read: "unlimited"
      responses:
        "200":
          description: Quota updated
        "400":
          description: Invalid pubkey format
        "401":
          description: Missing or invalid admin password
        "404":
          description: User not found
        "422":
          description: Invalid quota format

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Grant-based bearer token from `POST /auth/grant/session`.

    cookieAuth:
      type: apiKey
      in: cookie
      name: session
      description: |
        Deprecated. In practice, the cookie name is the user's z-base-32
        public key and the value is the session secret. The `name` field here
        is a placeholder; the actual name varies per user.

    adminPassword:
      type: apiKey
      in: header
      name: X-Admin-Password
      description: Admin server password.

    adminBasicAuth:
      type: http
      scheme: basic
      description: Basic auth for WebDAV endpoints. Username `admin`, password is the admin password.

  parameters:
    PubkyHost:
      name: pubky-host
      in: header
      required: false
      description: |
        Target tenant's z-base-32 encoded public key.
        On the Pubky TLS socket, this is derived from the `Host` header / SNI.
      schema:
        type: string

    PubkyHostQuery:
      name: pubky-host
      in: query
      required: false
      description: |
        Fallback for tenant identification when the `pubky-host` header and
        `Host` header do not contain a valid public key.
      schema:
        type: string

    AdminPubkey:
      name: pubkey
      in: path
      required: true
      description: User's z-base-32 encoded public key.
      schema:
        type: string

  schemas:
    # ── Auth ────────────────────────────────────────────────────────────

    CreateGrantSessionRequest:
      type: object
      required: [grant, pop]
      properties:
        grant:
          type: string
          description: Grant JWS in compact form (user-signed).
        pop:
          type: string
          description: Proof-of-Possession JWS in compact form (client-signed).

    GrantSessionResponse:
      type: object
      required: [token, session]
      properties:
        token:
          type: string
          description: Opaque bearer token.
        session:
          $ref: "#/components/schemas/GrantSessionInfo"

    GrantSessionInfo:
      type: object
      required:
        - homeserver
        - pubky
        - client_id
        - capabilities
        - grant_id
        - token_expires_at
        - grant_expires_at
        - created_at
      properties:
        homeserver:
          type: string
          description: z-base-32 encoded homeserver public key.
        pubky:
          type: string
          description: z-base-32 encoded user public key.
        client_id:
          type: string
          description: Application identifier (domain string).
        capabilities:
          type: array
          items:
            type: string
          description: Authorized capabilities (e.g. `["/:rw"]` for root, `["/pub/app/:rw"]` for scoped read-write).
        grant_id:
          type: string
          description: Grant identifier.
        token_expires_at:
          type: integer
          format: int64
          minimum: 0
          description: When the bearer token expires (Unix seconds).
        grant_expires_at:
          type: integer
          format: int64
          minimum: 0
          description: When the underlying grant expires (Unix seconds).
        created_at:
          type: integer
          format: int64
          minimum: 0
          description: When this session was created (Unix seconds).

    GrantInfo:
      type: object
      required: [grant_id, client_id, capabilities, issued_at, expires_at]
      properties:
        grant_id:
          type: string
          description: Grant identifier (revocation target).
        client_id:
          type: string
          description: Application identifier.
        capabilities:
          type: string
          description: Comma-separated capability string.
        issued_at:
          type: integer
          format: int64
          minimum: 0
          description: Issued-at timestamp (Unix seconds).
        expires_at:
          type: integer
          format: int64
          minimum: 0
          description: Expiry timestamp (Unix seconds).

    SignupTokenResponse:
      type: object
      required: [status, created_at]
      properties:
        status:
          type: string
          enum: [valid, used]
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp.

    SignupTokensResponse:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SignupTokenItem"
        next_cursor:
          type: ["string", "null"]
          description: Cursor for the next page, or `null` if this is the last page.

    SignupTokenItem:
      type: object
      required: [token, created_at, used_at, used_by]
      properties:
        token:
          type: string
          description: The signup token string.
        created_at:
          type: string
          format: date-time
          description: When the token was created.
        used_at:
          type: ["string", "null"]
          format: date-time
          description: When the token was used, or `null` if unused.
        used_by:
          type: ["string", "null"]
          description: z-base-32 public key of the user who used the token, or `null` if unused.

    # ── Admin ───────────────────────────────────────────────────────────

    AdminInfoResponse:
      type: object
      required:
        - num_users
        - num_disabled_users
        - total_disk_used_mb
        - num_signup_codes
        - num_unused_signup_codes
        - public_key
        - pkarr_pubky_address
        - pkarr_icann_domain
        - version
      properties:
        num_users:
          type: integer
          format: int64
          minimum: 0
        num_disabled_users:
          type: integer
          format: int64
          minimum: 0
        total_disk_used_mb:
          type: integer
          format: int64
          minimum: 0
        num_signup_codes:
          type: integer
          format: int64
          minimum: 0
        num_unused_signup_codes:
          type: integer
          format: int64
          minimum: 0
        public_key:
          type: string
          description: z-base-32 encoded homeserver public key.
        pkarr_pubky_address:
          type: ["string", "null"]
          description: Pubky address from pkarr config.
        pkarr_icann_domain:
          type: ["string", "null"]
          description: ICANN domain from pkarr config.
        version:
          type: string
          description: Homeserver version.

    # ── Quota ───────────────────────────────────────────────────────────

    UserQuota:
      type: object
      description: |
        Quota configuration. All fields are optional.
        - Absent or `null`: use system default
        - `"unlimited"`: no limit
        - Value: explicit limit
      properties:
        storage_quota_mb:
          description: Storage quota in megabytes, `"unlimited"`, or `null` for default.
          oneOf:
            - type: integer
            - type: string
              enum: [unlimited]
        rate_read:
          description: 'Read bandwidth limit (e.g. `"200mb/m"`, `"unlimited"`, or `null`).'
          type: string
        rate_write:
          description: 'Write bandwidth limit (e.g. `"100mb/m"`, `"unlimited"`, or `null`).'
          type: string
        rate_read_burst:
          description: |
            Burst override for read rate limit, in the rate's natural unit
            (MB for "…mb/s", KB for "…kb/s"). `null` or absent = burst equals rate (default).
          type: integer
          format: int32
          minimum: 1
        rate_write_burst:
          description: |
            Burst override for write rate limit, in the rate's natural unit
            (MB for "…mb/s", KB for "…kb/s"). `null` or absent = burst equals rate (default).
          type: integer
          format: int32
          minimum: 1
        allowed_write_paths:
          description: |
            Restrict which paths a user can write to.
            - `null` or absent: unrestricted (all paths allowed) — default
            - `[]`: read-only (no writes allowed)
            - `["/pub/tokens/", "/pub/paykit/"]`: only these prefix paths
          type: array
          items:
            type: string

    UserQuotaPatch:
      type: object
      description: |
        Partial quota update. Only fields present in the body are changed.
        - Absent: keep existing value (no change)
        - `null`: reset to system default
        - `"unlimited"`: no limit
        - Value: explicit custom limit
      properties:
        storage_quota_mb:
          description: Storage quota in MB, `"unlimited"`, or `null` to reset.
          oneOf:
            - type: integer
            - type: string
              enum: [unlimited]
            - type: "null"
        rate_read:
          description: 'Read bandwidth limit string, `"unlimited"`, or `null` to reset.'
          type: ["string", "null"]
        rate_write:
          description: 'Write bandwidth limit string, `"unlimited"`, or `null` to reset.'
          type: ["string", "null"]
        rate_read_burst:
          description: "Burst for read rate limit (in rate's natural unit), or `null` to reset to default."
          type: ["integer", "null"]
          format: int32
          minimum: 1
        rate_write_burst:
          description: "Burst for write rate limit (in rate's natural unit), or `null` to reset to default."
          type: ["integer", "null"]
          format: int32
          minimum: 1
        allowed_write_paths:
          description: |
            Allowed write paths. Absent = keep existing, `null` = reset to unrestricted,
            `[]` = read-only, `["/pub/tokens/"]` = only these prefix paths.
          type: ["array", "null"]
          items:
            type: string

    UserQuotaResponse:
      type: object
      required: [effective, overrides]
      properties:
        effective:
          description: Overrides merged with system defaults. All fields are always present.
          allOf:
            - $ref: "#/components/schemas/UserQuota"
        overrides:
          description: Only per-user customizations. Fields using the system default are omitted.
          allOf:
            - $ref: "#/components/schemas/UserQuota"
