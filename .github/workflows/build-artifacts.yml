# This workflow builds the artifacts for the release.
# It creates the gzips and uploads them as artifacts.
# The artifacts can then be used to create a release on Github.

name: Build Artifacts

on:
  # This workflow is triggered every time a push is made to the main branch.
  # Aka when a PR is merged.
  push:
    branches: [main]

env:
  CROSS_REV: 51f46f296253d8122c927c5bb933e3c4f27cc317

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Setup the environment
      - name: Log in to GitHub Container Registry # Where we store the docker images with the cross compile toolchain for Apple
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          # Cache Cargo downloads and installed tools, but exclude target artifacts.
          # Cross images tagged :latest may change and make restored artifacts incompatible.
          cache-targets: false

          # Cache the installed cross executable by its pinned source revision.
          # Changing CROSS_REV therefore creates a fresh cache entry.
          # Include ImageOS to avoid runner glibc incompatibilities.
          key: cross-${{ env.CROSS_REV }}
          env-vars: ImageOS

      - name: Install cross # Tool to cross-compile the binaries
        run: cargo install cross --locked --git https://github.com/cross-rs/cross --rev "$CROSS_REV"


      # Build artifacts
      - name: Build Artifacts
        run: .scripts/build-artifacts.sh

      # Upload artifacts to Github
      - name: Gzip artifacts
        run: (cd target && tar -czf github-release.tar.gz github-release)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pubky-core-artifacts.tar.gz
          path: target/github-release.tar.gz
          if-no-files-found: error
          overwrite: true
