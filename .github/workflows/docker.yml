name: Build and Publish Docker Image

on:
  push:
    tags: ['v*']

permissions:
    contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      matrix:
        include:
         - image: homeserver-testnet
           build_args: |
             BUILD_TARGET=testnet
         - image: homeserver
           build_args: |
             BUILD_TARGET=homeserver
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enforce Tag is on Main Branch
        run: |
          # Get the exact commit hash of the tag
          TAG_COMMIT=$(git rev-parse HEAD)

          # Check if that commit exists in the remote main branch history
          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "❌ SECURITY ERROR: Tag does not belong to the main branch history."
            exit 1
          fi
          echo "✅ Security check passed. Tag is a valid ancestor of main."

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: pubky/ci-workflows/.github/actions/docker/build_and_push@main
        with:
          registry: registry-1.docker.io/synonymsoft
          context: .
          push: true
          latest: true
          tags: |
            type=ref,event=tag
          platforms: |
            linux/arm64
            linux/amd64
          image: ${{ matrix.image }}
          cache_from: type=gha
          cache_to: type=gha,mode=max
          build_args: ${{ matrix.build_args }}
